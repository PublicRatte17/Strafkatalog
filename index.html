<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrandRP Strafkatalog Rechner</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #ff4d4d; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        
        .category-title { background: #333; padding: 8px 15px; margin-top: 20px; border-radius: 5px; font-weight: bold; border-left: 4px solid var(--accent); }
        
        .crime-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; transition: 0.2s; cursor: pointer; }
        .crime-item:hover { background: #252525; }
        .crime-item input { width: 20px; height: 20px; margin-right: 15px; cursor: pointer; }
        
        .info { font-size: 0.9em; color: #aaa; text-align: right; }
        
        .result-sticky { position: sticky; bottom: 0; background: var(--card); padding: 20px; border-top: 2px solid var(--accent); margin-top: 30px; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .summary-box { background: #000; padding: 15px; border-radius: 5px; font-family: monospace; margin-bottom: 15px; min-height: 60px; border: 1px solid #444; }
        
        button { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1.1em; font-weight: bold; transition: 0.3s; }
        button:hover { background: #ff1a1a; transform: translateY(-2px); }
        .copy-hint { text-align: center; font-size: 0.8em; margin-top: 8px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>LSPD Strafrechner</h2>
    
    <div id="crime-list">
        </div>

    <div class="result-sticky">
        <div class="summary-box" id="output">Keine Delikte ausgewählt.</div>
        <button onclick="copyToClipboard()">Strafmaß kopieren</button>
        <div class="copy-hint">In die Zwischenablage kopieren für GTA Chat / PDA</div>
    </div>
</div>

<script>
    // Hier kannst du die Straftaten pflegen
    const database = [
        { cat: "Allgemeines & Ordnung", items: [
            { name: "Beamtenbeleidigung", fine: 5000, time: 0 },
            { name: "Widerstand", fine: 10000, time: 15 },
            { name: "Maskierungsverbot", fine: 2500, time: 0 }
        ]},
        { cat: "Waffengesetz", items: [
            { name: "Besitz illegaler Waffen", fine: 20000, time: 30 },
            { name: "Waffengebrauch in der Stadt", fine: 15000, time: 20 },
            { name: "Waffenhandel", fine: 50000, time: 60 }
        ]},
        { cat: "Betäubungsmittel", items: [
            { name: "Besitz von Drogen", fine: 10000, time: 10 },
            { name: "Drogenhandel", fine: 35000, time: 40 }
        ]},
        { cat: "Straßenverkehrsordnung", items: [
            { name: "Falschparken", fine: 1000, time: 0 },
            { name: "Raser (Innerorts)", fine: 5000, time: 0 },
            { name: "Fahren ohne Führerschein", fine: 5000, time: 10 }
        ]}
    ];

    const crimeListContainer = document.getElementById('crime-list');
    const outputDiv = document.getElementById('output');

    // Liste rendern
    function init() {
        database.forEach(category => {
            const catTitle = document.createElement('div');
            catTitle.className = 'category-title';
            catTitle.innerText = category.cat;
            crimeListContainer.appendChild(catTitle);

            category.items.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'crime-item';
                // Klick auf das ganze Feld wählt Checkbox aus
                itemDiv.onclick = (e) => {
                    if(e.target.tagName !== 'INPUT') {
                        const cb = itemDiv.querySelector('input');
                        cb.checked = !cb.checked;
                        updateSummary();
                    }
                };

                itemDiv.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <input type="checkbox" onchange="updateSummary()" data-name="${item.name}" data-fine="${item.fine}" data-time="${item.time}">
                        <span>${item.name}</span>
                    </div>
                    <div class="info">$${item.fine.toLocaleString()} | ${item.time} Min</div>
                `;
                crimeListContainer.appendChild(itemDiv);
            });
        });
    }

    function updateSummary() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
        let totalFine = 0;
        let totalTime = 0;
        let selectedNames = [];

        checkboxes.forEach(cb => {
            totalFine += parseInt(cb.dataset.fine);
            totalTime += parseInt(cb.dataset.time);
            selectedNames.push(cb.dataset.name);
        });

        if (selectedNames.length === 0) {
            outputDiv.innerText = "Keine Delikte ausgewählt.";
            return;
        }

        outputDiv.innerText = `Paragrafen: ${selectedNames.join(', ')}\nGesamtstrafe: $${totalFine.toLocaleString()}\nHaftzeit: ${totalTime} Monate/Minuten`;
    }

    function copyToClipboard() {
        const text = outputDiv.innerText;
        if(text === "Keine Delikte ausgewählt.") return;
        
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "KOPIERT!";
            btn.style.background = "#2ecc71";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
            }, 1500);
        });
    }

    init();
</script>

</body>
</html>
